spring:
  application:
    name: spring-board

  config:
    import: ./config.yml

  mvc:
    view:
      prefix: /WEB-INF/views/
      suffix: .jsp

  datasource:
    url: ${db.url}
    username: ${db.username}
    password: ${db.password}
    driver-class-name: com.mysql.cj.jdbc.Driver

  servlet:
    encoding:
      charset: utf-8
      force: true
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  mail:
    host: smtp.gmail.com
    username: ${mail.username}
    password: ${mail.password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

mybatis:
  mapper-locations: classpath:mappers/**/*.xml
  configuration:
    map-underscore-to-camel-case: false
    #sql을 이요하여 단어 구분
    #자바에서는 camelCase로 구분
    #sql대소문자 구분 없음을 이용해서 주로 단어 구분
    #자바에서는 카멜케이스 많이 사용


file:
  upload:
    path: ${upload.profile-path}
    board-path: ${upload.board-path}

jwt:
  secret: ${jwt.config.secret}
  access-expiry: 1800000
  refresh-expiry: 120960000

